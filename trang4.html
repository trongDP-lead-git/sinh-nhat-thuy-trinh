    <title>Bức Tường Kỷ Niệm</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        background-color: #000;
        overflow-x: hidden;
        font-family: "Segoe UI", sans-serif;
      }

      /* Lưới ảnh lấp đầy toàn màn hình */
      .photo-wall {
        display: grid;
        /* Mỗi ảnh rộng khoảng 150px, tự động chia đều để lấp đầy chiều ngang */
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        /* Loại bỏ khoảng cách giữa các ảnh để khít nhau hoàn toàn */
        gap: 2px;
        width: 100vw;
      }

      .photo-item {
        position: relative;
        overflow: hidden;
        /* Đảm bảo ảnh luôn là hình vuông */
        aspect-ratio: 1 / 1;
        cursor: pointer;
      }

      .photo-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: all 0.5s ease;
        filter: grayscale(30%); /* Hơi xám nhẹ cho nghệ thuật */
      }

      /* Hiệu ứng khi lướt chuột qua */
      .photo-item:hover img {
        transform: scale(1.2);
        filter: grayscale(0%);
        z-index: 10;
      }

      /* Tiêu đề nổi lên trên bức tường ảnh */
      .overlay-text {
        position: absolute; /* Thay từ fixed thành absolute để nó nằm ở đầu trang */
        top: 20px; /* Khoảng cách từ đỉnh xuống */
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
        pointer-events: none;
        text-align: center;
        width: 90%; /* Giới hạn chiều rộng để không bị tràn lề */
      }

      .overlay-text h1 {
        background: rgba(255, 255, 255, 0.85);
        color: #ff4d79;
        padding: 10px 20px; /* Thu nhỏ padding */
        display: inline-block;
        border-radius: 30px; /* Bo góc nhỏ lại một chút */
        font-size: 1.2rem; /* CHỮ NHỎ LẠI: Bạn có thể chỉnh 1.0 đến 1.5 tùy ý */dd
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        letter-spacing: 1px;
        margin: 0;
      }

      /* Nút chuyển trang */
      .btn-next {
        font-size: 0.9rem;
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #ff4d79;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 50px;
        font-weight: bold;
        text-decoration: none;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
        z-index: 101;
        transition: 0.3s;
      }

      .btn-next:hover {
        transform: scale(1.1);
        background: #ff1a53;
      }

      /* Hiệu ứng ảnh hiện ra từ từ khi load */
      @keyframes zoomIn {
        from {
          opacity: 0;
          transform: scale(0.8);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .photo-item {
        animation: zoomIn 0.8s ease forwards;
      }
    </style>
  </head>
