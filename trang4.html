    <title>Bức Tường Kỷ Niệm</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        background-color: #000;
        overflow-x: hidden;
        font-family: "Segoe UI", sans-serif;
      }

      /* Lưới ảnh lấp đầy toàn màn hình */
      .photo-wall {
        display: grid;
        /* Mỗi ảnh rộng khoảng 150px, tự động chia đều để lấp đầy chiều ngang */
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        /* Loại bỏ khoảng cách giữa các ảnh để khít nhau hoàn toàn */
        gap: 2px;
        width: 100vw;
      }

      .photo-item {
        position: relative;
        overflow: hidden;
        /* Đảm bảo ảnh luôn là hình vuông */
        aspect-ratio: 1 / 1;
        cursor: pointer;
      }

      .photo-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: all 0.5s ease;
        filter: grayscale(30%); /* Hơi xám nhẹ cho nghệ thuật */
      }

      /* Hiệu ứng khi lướt chuột qua */
      .photo-item:hover img {
        transform: scale(1.2);
        filter: grayscale(0%);
        z-index: 10;
      }

      /* Tiêu đề nổi lên trên bức tường ảnh */
      .overlay-text {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 100;
        pointer-events: none; /* Để vẫn có thể lướt chuột vào ảnh phía dưới */
        text-align: center;
        width: 100%;
      }

      .overlay-text h1 {
        background: rgba(255, 255, 255, 0.8);
        color: #ff4d79;
        padding: 20px 50px;
        display: inline-block;
        border-radius: 50px;
        font-size: 2.5rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        letter-spacing: 2px;
      }

      /* Nút chuyển trang */
      .btn-next {
        position: fixed;
        bottom: 30px;
        right: 30px;
        background: #ff4d79;
        color: white;
        border: none;
        padding: 15px 35px;
        border-radius: 50px;
        font-weight: bold;
        text-decoration: none;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
        z-index: 101;
        transition: 0.3s;
      }

      .btn-next:hover {
        transform: scale(1.1);
        background: #ff1a53;
      }

      /* Hiệu ứng ảnh hiện ra từ từ khi load */
      @keyframes zoomIn {
        from {
          opacity: 0;
          transform: scale(0.8);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .photo-item {
        animation: zoomIn 0.8s ease forwards;
      }
    </style>
  </head>
