<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bức Tường Kỷ Niệm</title>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        background-color: #000;
        overflow-x: hidden;
        font-family: "Segoe UI", sans-serif;
      }

      /* Lớp nền đen khi phóng to ảnh */
      .lightbox {
        display: none; /* Ban đầu ẩn đi */
        position: fixed;
        z-index: 1000;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.9);
        justify-content: center;
        align-items: center;
        cursor: zoom-out;
      }

      /* Ảnh phóng to ở giữa */
      .lightbox img {
        max-width: 90%;
        max-height: 80%;
        border: 3px solid white;
        border-radius: 10px;
        box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
        animation: zoomIn 0.3s ease-out;
      }

      @keyframes zoomIn {
        from {
          transform: scale(0.7);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      /* Nút đóng (tùy chọn) */
      .close-lightbox {
        position: absolute;
        top: 20px;
        right: 30px;
        color: white;
        font-size: 40px;
        font-weight: bold;
        cursor: pointer;
      }

      /* Lưới ảnh lấp đầy toàn màn hình */
      .photo-wall {
        display: grid;
        /* Mỗi ảnh rộng khoảng 150px, tự động chia đều để lấp đầy chiều ngang */
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        /* Loại bỏ khoảng cách giữa các ảnh để khít nhau hoàn toàn */
        gap: 2px;
        width: 100vw;
      }

      .photo-item {
        position: relative;
        overflow: hidden;
        /* Đảm bảo ảnh luôn là hình vuông */
        aspect-ratio: 1 / 1;
        cursor: pointer;
      }

      .photo-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: all 0.5s ease;
        filter: grayscale(30%); /* Hơi xám nhẹ cho nghệ thuật */
      }

      /* Hiệu ứng khi lướt chuột qua */
      .photo-item:hover img {
        transform: scale(1.2);
        filter: grayscale(0%);
        z-index: 10;
      }

      /* Tiêu đề nổi lên trên bức tường ảnh */
      .overlay-text {
        position: absolute; /* Thay từ fixed thành absolute để nó nằm ở đầu trang */
        top: 20px; /* Khoảng cách từ đỉnh xuống */
        left: 50%;
        transform: translateX(-50%);
        z-index: 100;
        pointer-events: none;
        text-align: center;
        width: 90%; /* Giới hạn chiều rộng để không bị tràn lề */
      }

      .overlay-text h1 {
        background: rgba(255, 255, 255, 0.85);
        color: #ff4d79;
        padding: 10px 20px; /* Thu nhỏ padding */
        display: inline-block;
        border-radius: 30px; /* Bo góc nhỏ lại một chút */
        font-size: 1.2rem; /* CHỮ NHỎ LẠI: Bạn có thể chỉnh 1.0 đến 1.5 tùy ý */
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        letter-spacing: 1px;
        margin: 0;
      }

      /* Nút chuyển trang */
      .btn-next {
        font-size: 0.9rem;
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #ff4d79;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 50px;
        font-weight: bold;
        text-decoration: none;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
        z-index: 101;
        transition: 0.3s;
      }

      .btn-next:hover {
        transform: scale(1.1);
        background: #ff1a53;
      }

      /* Hiệu ứng ảnh hiện ra từ từ khi load */
      @keyframes zoomIn {
        from {
          opacity: 0;
          transform: scale(0.8);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      .photo-item {
        animation: zoomIn 0.8s ease forwards;
      }
    </style>
    <script>
      function zoomImage(element) {
        const lightbox = document.getElementById("lightbox");
        const lightboxImg = document.getElementById("lightbox-img");

        // Lấy đường dẫn ảnh từ tấm ảnh vừa click
        lightboxImg.src = element.src;

        // Hiển thị lightbox
        lightbox.style.display = "flex";
      }

      function closeImage() {
        // Ẩn lightbox khi click vào vùng đen hoặc nút đóng
        document.getElementById("lightbox").style.display = "none";
      }
    </script>
